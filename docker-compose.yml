services:
  mysql:
    image: mysql:8.4
    container_name: sqlazy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=1G
      - --innodb_buffer_pool_size=1G
      - --local_infile=1
    volumes:
      - mysql_data:/var/lib/mysql
      - ./exportedsql:/sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  mysql_data:
